# WebSocket upgrade helper: "upgrade" for WS handshakes, "close" otherwise, so
# the same /go2rtc/ location works for both the signaling WebSocket and plain
# HTTP requests to go2rtc.
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # go2rtc, same-origin. The browser opens a signaling WebSocket here
  # (/go2rtc/api/ws?src=…) for WebRTC/MSE; WebRTC media itself flows directly to
  # the host's published 8555 port, not through this proxy. Long timeouts and no
  # buffering keep the signaling socket and any MSE fallback alive.
  location /go2rtc/ {
    proxy_pass http://go2rtc:1984/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  location /api/print-orchestrator/ {
    proxy_pass http://print-orchestrator:3100/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # The camera live stream (camera.mp4) is a single long-lived response.
    # With nginx's defaults it would be buffered (adding latency and stutter)
    # and dropped after the 60s read timeout on any brief source stall. Stream
    # it straight through and keep the connection open. JSON API responses are
    # tiny, so disabling buffering for them too is harmless.
    proxy_buffering off;
    proxy_set_header Connection "";
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }
}
