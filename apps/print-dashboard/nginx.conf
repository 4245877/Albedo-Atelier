# NOTE: this file is an nginx *template* (see Dockerfile): the official nginx
# image envsubst's it into /etc/nginx/conf.d/default.conf at container start,
# substituting only ${ORCHESTRATOR_API_TOKEN} (defined env vars); nginx runtime
# variables ($host, $uri, …) are left untouched because they are not in the
# container environment.

# WebSocket upgrade helper: "upgrade" for WS handshakes, "close" otherwise, so
# the same /go2rtc/ location works for both the signaling WebSocket and plain
# HTTP requests to go2rtc.
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

# Server-side allowlist of go2rtc stream ids the browser may request. Only the
# known camera stream(s) defined in config/go2rtc.yaml are permitted; any other
# value of ?src= is refused. In go2rtc 1.9.x an unknown src is interpreted as a
# NEW stream URI, so an arbitrary src=http://…/rtsp://…/webrtc://… would be an
# SSRF / LAN-scan / resource-exhaustion vector. Add new stream ids here when they
# are added to go2rtc.yaml.
map $arg_src $go2rtc_src_ok {
  default 0;
  "k2"    1;
}

# Per-client-IP rate and concurrent-connection caps for the go2rtc signaling
# socket, so a single client cannot open unbounded WebSockets or hammer it. Zones
# live in http context (this template is included inside http {}).
limit_req_zone  $binary_remote_addr zone=go2rtc_ws:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=go2rtc_conn:10m;

# Per-client-IP caps for the orchestrator API/upload proxy: bound request rate
# and concurrent connections so a single client cannot exhaust the service with
# a flood of uploads or slow/half-open connections. Generous enough for the
# dashboard's polling + live camera streams on the trusted LAN.
limit_req_zone  $binary_remote_addr zone=api_req:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=api_conn:10m;

server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(?:js|css)$ {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  # go2rtc, same-origin — ONLY the signaling WebSocket the dashboard player
  # actually uses (/go2rtc/api/ws?src=<known-id>). The rest of the go2rtc HTTP
  # API (config editing, stream management, restart) must not be reachable from
  # the LAN, so it is not proxied. WebRTC media itself flows directly to the
  # host's published 8555 port, not through this proxy. Long timeouts and no
  # buffering keep the signaling socket and any MSE fallback alive.
  location = /go2rtc/api/ws {
    # Only a known stream id may be requested — never an arbitrary src URI.
    if ($go2rtc_src_ok = 0) { return 403; }
    # No producer/consumer injection: dst= can attach to or hijack a producer.
    if ($arg_dst) { return 403; }

    # Per-IP rate + concurrent-connection caps.
    limit_req  zone=go2rtc_ws burst=20 nodelay;
    limit_conn go2rtc_conn 8;

    # Forward ONLY the vetted src to go2rtc, dropping every other query arg. This
    # neutralises parameter pollution (src=k2&src=<evil>, where $arg_src is the
    # first "k2" but go2rtc might read another) and any stray dst=/module args.
    set $args src=$arg_src;

    proxy_pass http://go2rtc:1984/api/ws;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  location /go2rtc/ {
    return 404;
  }

  location /api/print-orchestrator/ {
    # File uploads (POST /api/print/artifacts) stream through this proxy, so the
    # default 1 MB body cap would reject real slices. Allow up to the
    # orchestrator's single-file limit (MAX_UPLOAD_FILE_BYTES, default 200 MB)
    # with a little headroom; the orchestrator itself enforces the exact limit.
    client_max_body_size 210m;

    # Per-IP request-rate + concurrent-connection caps: a single client cannot
    # flood the API or hold open unbounded (slow) upload connections. 503 on
    # excess. The orchestrator additionally enforces store/disk/queue quotas.
    limit_req    zone=api_req burst=60 nodelay;
    limit_conn   api_conn 24;
    limit_req_status 429;
    limit_conn_status 429;

    # camera.jpg?ensureLight=1 switches the chamber light on — a side effect the
    # dashboard UI never triggers via this proxy (it is for direct server-to-
    # server consumers like fulfillment, which authenticate with the token).
    # Refuse it here so a drive-by <img src=…ensureLight=1> from a malicious
    # page cannot flip the light through the published dashboard port.
    if ($arg_ensureLight != "") { return 403; }

    proxy_pass http://print-orchestrator:3100/;
    proxy_http_version 1.1;
    # $http_host (not $host) so the orchestrator's CSRF Origin check can compare
    # the browser's Origin host:port against the exact host the page came from.
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # The dashboard page is served on the trusted LAN without its own login, so
    # the proxy injects the orchestrator API token for it (README "Ports &
    # security"): the token then gates only *direct* API access (compose
    # network, fulfillment). Browser CSRF is still refused by the
    # orchestrator's Origin check — the browser's Origin header passes through
    # this proxy untouched.
    proxy_set_header Authorization "Bearer ${ORCHESTRATOR_API_TOKEN}";

    # The camera live stream (camera.mp4; fMP4 or MJPEG by source) is a single
    # long-lived response.
    # With nginx's defaults it would be buffered (adding latency and stutter)
    # and dropped after the 60s read timeout on any brief source stall. Stream
    # it straight through and keep the connection open. JSON API responses are
    # tiny, so disabling buffering for them too is harmless.
    proxy_buffering off;
    proxy_set_header Connection "";
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }
}
