# Bridges the Creality K2 proprietary WebRTC camera into HTTP endpoints
# reachable by print-orchestrator over the compose network:
#   http://go2rtc:1984/api/frame.jpeg?src=k2
#   http://go2rtc:1984/api/stream.mp4?src=k2
#
# The #format=creality suffix enables go2rtc's Creality signaling handshake.
streams:
  k2: ${K2_CAMERA_SOURCE}

api:
  listen: ":1984"

# WebRTC is the only transport that gets keyframes out of the Creality K2, so
# the dashboard streams it over WebRTC. go2rtc listens on 8555 (published to the
# host in compose) and advertises the host's LAN address as the ICE candidate,
# so LAN browsers can reach the media plane directly.
webrtc:
  listen: ":8555"
  candidates:
    - ${GO2RTC_WEBRTC_CANDIDATE}

log:
  level: info
