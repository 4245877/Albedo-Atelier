services:
  go2rtc:
    # Pinned by digest for reproducible pulls (tag kept for humans). Update both
    # together: `docker inspect --format '{{index .RepoDigests 0}}' <image>`.
    image: alexxit/go2rtc:1.9.14@sha256:675c318b23c06fd862a61d262240c9a63436b4050d177ffc68a32710d9e05bae
    container_name: atelier-go2rtc
    restart: unless-stopped
    environment:
      K2_CAMERA_SOURCE: "webrtc:http://192.168.0.132:8000/call/webrtc_local#format=creality"
      # WebRTC ICE candidate the browser dials for media. Must be the host's
      # LAN address (not the container IP) and match the published 8555 port
      # below. Change this if the host IP changes.
      GO2RTC_WEBRTC_CANDIDATE: "192.168.0.139:8555"
    volumes:
      - ./apps/print-orchestrator/config/go2rtc.yaml:/config/go2rtc.yaml:ro
    ports:
      # go2rtc HTTP API. The browser reaches it same-origin via the dashboard's
      # /go2rtc/ nginx proxy (internal go2rtc:1984), so it does not need to be on
      # the LAN — bind to localhost for host-side debugging only.
      - "127.0.0.1:1985:1984"
      # WebRTC media (browser ↔ go2rtc). The Creality K2 only delivers keyframes
      # over its native WebRTC, so this is the working live-video path and it
      # must stay reachable on the LAN. UDP is the normal path, TCP the fallback.
      - "0.0.0.0:8555:8555/tcp"
      - "0.0.0.0:8555:8555/udp"

  print-orchestrator:
    build:
      context: ./apps/print-orchestrator
    container_name: atelier-print-orchestrator
    depends_on:
      - go2rtc
    environment:
      NODE_ENV: production
      SERVICE_NAME: print-orchestrator
      HOST: 0.0.0.0
      PORT: 3100
      LOG_LEVEL: info
      # Fastify's default 10 s plugin/onReady budget is shorter than a valid
      # first device poll (status -> light policy -> camera). Keep this below
      # the healthcheck start_period so slow/offline printers do not create a
      # restart loop and a transient unhealthy dependency.
      STARTUP_TIMEOUT_MS: ${STARTUP_TIMEOUT_MS:-45000}
      PRINTERS_CONFIG_PATH: /app/config/printers.json
      PRINTER_POLL_INTERVAL_MS: 10000
      # Durable state (operator queue, event feed, today counters). Lives on the
      # named volume below so it survives `docker compose down` / recreation.
      STATE_FILE_PATH: /app/data/state.json
      # Local timezone for the night-print window (NIGHT_PRINT_WINDOW), the
      # light schedule's date rollover, the dashboard event timestamps and the
      # "today" counter rollover. Must be the farm's real timezone, NOT UTC:
      # with UTC every local-time window is interpreted as UTC, so lights and
      # theme switch at the wrong local time. Override via TZ in .env if the
      # farm moves.
      TZ: ${TZ:-Europe/Kyiv}
      # Chamber-light schedule: sunset/sunrise computed locally (no external
      # APIs) for the farm's coordinates; `fixed` returns to a fixed window.
      # NIGHT_PRINT_WINDOW deliberately stays a separate setting (night-print
      # planning + dashboard theme). Bad values never crash the service — it
      # degrades to LIGHT_FALLBACK_WINDOW and reports a warning on the panel.
      LIGHT_SCHEDULE_MODE: ${LIGHT_SCHEDULE_MODE:-solar}
      LIGHT_LATITUDE: ${LIGHT_LATITUDE:-50.45}
      LIGHT_LONGITUDE: ${LIGHT_LONGITUDE:-30.52}
      # Lights go on 30 min before sunset and off 30 min after sunrise.
      LIGHT_ON_OFFSET_MINUTES: ${LIGHT_ON_OFFSET_MINUTES:--30}
      LIGHT_OFF_OFFSET_MINUTES: ${LIGHT_OFF_OFFSET_MINUTES:-30}
      # Light only printers that are printing/paused; idle ones stay dark.
      LIGHT_ONLY_WHEN_ACTIVE: ${LIGHT_ONLY_WHEN_ACTIVE:-true}
      LIGHT_FALLBACK_WINDOW: ${LIGHT_FALLBACK_WINDOW:-16:00-08:00}
      # Auto-deduct filament from the fulfillment warehouse when a print finishes.
      # Empty = disabled (the farm runs standalone). Set FULFILLMENT_API_URL in .env
      # to fulfillment's published API on the host LAN, e.g. http://192.168.0.139:3001
      # (or http://fulfillment-api:8080 if both compose projects share a network).
      FULFILLMENT_API_URL: ${FULFILLMENT_API_URL:-}
      # Inter-service token for fulfillment's consume/sync endpoints (sent as the
      # x-service-token header). Must equal ATELIER_FULFILLMENT_TOKEN on the
      # fulfillment side. Set it in .env (gitignored) — never here.
      ATELIER_FULFILLMENT_TOKEN: ${ATELIER_FULFILLMENT_TOKEN:-}
      # Filament delivery reliability knobs (defaults documented in .env.example):
      # unresolved-sync retry delay, retry-queue cap, queued-deduction max age.
      FILAMENT_SYNC_RETRY_MS: ${FILAMENT_SYNC_RETRY_MS:-300000}
      FILAMENT_RETRY_QUEUE_MAX: ${FILAMENT_RETRY_QUEUE_MAX:-200}
      FILAMENT_RETRY_MAX_AGE_DAYS: ${FILAMENT_RETRY_MAX_AGE_DAYS:-7}
      # ── OrcaSlicer slicing runtime (optional) ───────────────────────────────
      # This image ships the preset CATALOG but NOT an OrcaSlicer binary (it is a
      # desktop app). Slicing therefore stays honestly BLOCKED — never faked — until
      # ORCA_SLICER_CMD points at a runtime. Two supported shapes, both configured
      # in .env (see .env.example → "OrcaSlicer slicing runtime"):
      #   1. a container runtime, network-disabled (preferred):
      #        ORCA_SLICER_CMD=docker
      #        ORCA_SLICER_BASE_ARGS=run --rm --network none -v {{workDir}}:{{workDir}} <image> orca-slicer
      #      (requires giving this service access to a container runtime — mount the
      #       Docker socket or use rootless podman; a deliberate host decision);
      #   2. a host/mounted OrcaSlicer binary:
      #        ORCA_SLICER_CMD=/opt/orca/orca-slicer   (mount it via a volume below)
      # Leaving ORCA_SLICER_CMD empty runs the farm without slicing — monitoring,
      # the queue and dispatch all work regardless. The orchestrator logs the runtime
      # status at boot and exposes it at GET /api/print/slicing/runtime.
      ORCA_SLICER_CMD: ${ORCA_SLICER_CMD:-}
      ORCA_SLICER_BASE_ARGS: ${ORCA_SLICER_BASE_ARGS:-}
      ORCA_SLICER_EXTRA_ARGS: ${ORCA_SLICER_EXTRA_ARGS:-}
      # Pin the slicer version the vendored bundles were exported from, so resolved
      # settings match what the CLI produces (probe warns on a mismatch).
      ORCA_SLICER_VERSION: ${ORCA_SLICER_VERSION:-2.3.0}
      ORCA_SLICER_NETWORK_ISOLATED: ${ORCA_SLICER_NETWORK_ISOLATED:-}
    env_file:
      - .env
    volumes:
      # Real printer config; edit on the host, restart the service to apply.
      - ./apps/print-orchestrator/config:/app/config:ro
      # Persisted runtime state — must be writable and outlive the container.
      - orchestrator-data:/app/data
      # Slicing runtime (optional): to use a host/mounted OrcaSlicer binary, mount it
      # read-only and set ORCA_SLICER_CMD to its in-container path (see above), e.g.:
      # - /opt/orca-slicer:/opt/orca:ro
      # For the container-runtime shape instead, grant a runtime rather than mounting
      # a binary, e.g. the Docker socket (a deliberate host-security decision):
      # - /var/run/docker.sock:/var/run/docker.sock
    # No host port: the control API (pause/resume/cancel/light) must not be
    # exposed on the LAN. The dashboard reaches it over the compose network via
    # nginx (proxy_pass http://print-orchestrator:3100). For host-side debugging
    # add a temporary `ports: ["127.0.0.1:3100:3100"]`.
    expose:
      - "3100"
    networks:
      - default
      # Shared bridge with the fulfillment stack: fulfillment-api reads
      # statuses and camera snapshots at http://print-orchestrator:3100 over
      # this network (read-only integration; the port stays off the LAN).
      # Create it once before the first `up`: ./ops/ensure-print-farm-network.sh
      - print-farm
    healthcheck:
      # /ready (not /health): 503 until the first printer poll completes and if
      # the poll loop goes stale, so the container is only "healthy" when it is
      # actually serving live data. /health always returns ok and would mask a
      # dead poll loop. A merely degraded farm still returns 200. start_period
      # covers the full startup-hook budget so startup is not flagged unhealthy.
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3100/ready').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  print-dashboard:
    build:
      context: ./apps/print-dashboard
    container_name: atelier-print-dashboard
    depends_on:
      print-orchestrator:
        condition: service_healthy
    environment:
      # nginx injects this as `Authorization: Bearer …` on the proxied control
      # API (see nginx.conf template): the LAN-trusted dashboard keeps working
      # while the token gates direct orchestrator access. Must match the
      # orchestrator's ORCHESTRATOR_API_TOKEN (both read the same .env).
      ORCHESTRATOR_API_TOKEN: ${ORCHESTRATOR_API_TOKEN:-}
    ports:
      # Fail-closed default: the dashboard (= control plane entry) binds to
      # loopback. Exposing it to the LAN is an explicit decision — set
      # DASHBOARD_BIND=0.0.0.0 in .env (and keep ORCHESTRATOR_API_TOKEN set;
      # see SECURITY.md for the firewall/VLAN checklist).
      - "${DASHBOARD_BIND:-127.0.0.1}:8090:8080"
    healthcheck:
      # Check both nginx and its real upstream path. A static-only probe would
      # report healthy while every dashboard API call returned 502/503.
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:8080/ >/dev/null 2>&1 && wget -qO- http://127.0.0.1:8080/api/print-orchestrator/ready >/dev/null 2>&1 || exit 1"
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  # Durable orchestrator state (queue, events, today counters) as a JSON file.
  orchestrator-data:

networks:
  # Shared cross-project bridge with the fulfillment stack. External on
  # purpose: it must not carry a directory-derived compose name and must let
  # either stack start first. Create it once (idempotent):
  #   ./ops/ensure-print-farm-network.sh
  # A missing network fails fast with "network print-farm declared as
  # external, but could not be found" — run the script and `up` again.
  print-farm:
    external: true
    name: print-farm
