name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # The Node service: typecheck (tests included), the full unit + integration
  # suite, build. The suite now includes the P0 regressions AND the
  # canonical-dispatch safety net: SQLite migration tests (008 fail-closed),
  # queue invariant tests (partial unique indexes, 409s), canonical dispatch
  # tests (preview conflicts, timeout → UNKNOWN, restart recovery, idempotency),
  # artifact hash/verdict gates, start-guard + run reconciliation, graceful
  # shutdown ordering, reconnect/completion, retention/orphan sweeps and the
  # proxy/auth/security-header tests. No real printers are contacted: printers
  # are fakes/mocks, SQLite is in-memory or tmpdir.
  print-orchestrator:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/print-orchestrator
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack (pins pnpm from packageManager)
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/print-orchestrator/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Typecheck (source + tests)
        run: pnpm run typecheck

      # Fast unit tests first (pure domain/app, no store boot): a quick failure
      # signal. The split is by content (scripts/select-tests.mjs), so a new
      # test classifies itself; the two commands together still cover the whole
      # suite that `pnpm test` runs.
      - name: Unit tests (fast; pure domain + app)
        run: pnpm run test:unit

      - name: Integration tests (SQLite store, HTTP routes, real catalog, dispatch/shutdown/retention/security)
        run: pnpm run test:integration

      - name: Complexity & file-size report (warn-only, never fails CI)
        run: pnpm run lint:complexity

      - name: Build
        run: pnpm run build

      - name: Dependency vulnerability audit (production deps)
        # Fail on known-vulnerable production dependencies; moderate+ severity.
        run: pnpm audit --prod --audit-level moderate

  # The dashboard: pure ES-module unit tests (view helpers, the polling-race
  # guard, the optimistic-locking edit snapshot, camera frame freshness) and
  # the nginx hardening/structural checks. No install needed — the suite is
  # `node --test` with no dependencies.
  print-dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/print-dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Dashboard tests (view helpers, polling race, edit snapshots, camera freshness, nginx hardening)
        run: node --test "tests/**/*.test.mjs"

      # Browser smoke test: boots the real dashboard in headless Chrome against a
      # mocked backend and asserts the app loads, the board renders live data,
      # and the frontend called the API. The chromedp/headless-shell service
      # exposes CDP on 9222; the test SKIPS when no browser is reachable.
      - name: Start headless Chrome (CDP)
        run: |
          docker run -d --name headless-shell --network host \
            chromedp/headless-shell:latest
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:9222/json/version >/dev/null && break
            sleep 1
          done

      - name: Dashboard browser smoke test
        env:
          CHROME_CDP_URL: http://127.0.0.1:9222
        run: node --test "smoke/**/*.smoke.mjs"

      - name: Stop headless Chrome
        if: always()
        run: docker rm -f headless-shell || true

      - name: Validate the rendered nginx config with the PINNED image (nginx -t)
        # Uses the exact image the Dockerfile pins (version + digest), so CI
        # validates the config against the nginx that will actually run it.
        run: |
          image="$(grep -oP '^FROM \K\S+' Dockerfile)"
          docker run --rm -e ORCHESTRATOR_API_TOKEN=ci-token \
            -v "$PWD/nginx.conf:/etc/nginx/templates/default.conf.template:ro" \
            "$image" sh -c '
              /docker-entrypoint.d/20-envsubst-on-templates.sh >/dev/null 2>&1
              sed -i "s|proxy_pass http://go2rtc:1984|proxy_pass http://127.0.0.1:19984|; s|proxy_pass http://print-orchestrator:3100|proxy_pass http://127.0.0.1:13100|" /etc/nginx/conf.d/default.conf
              nginx -t'

      - name: Build the dashboard image
        run: docker build -t atelier-print-dashboard:ci .

      - name: Image vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: atelier-print-dashboard:ci
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # The orchestrator container image: build + scan (base image and OS packages).
  orchestrator-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build the orchestrator image
        run: docker build -t atelier-print-orchestrator:ci apps/print-orchestrator

      - name: Image vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: atelier-print-orchestrator:ci
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
